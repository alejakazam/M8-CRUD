{% extends "base.html" %}

{% block title %}Eliminar Ticket{% endblock %}

{% block content %}
<div class="card border-danger">
    <div class="card-body">

        <h3 class="text-danger mb-3">Confirmar eliminación</h3>

        <p>
            ¿Seguro que deseas eliminar el ticket 
            <strong>#{{ object.id }}</strong>?
        </p>

        <p class="mb-4">
            <em>{{ object.titulo }}</em>
        </p>

        <form method="post">
            {% csrf_token %}

            <div class="d-flex gap-2">
                <button class="btn btn-danger" type="submit">
                    Sí, eliminar
                </button>

                <a class="btn btn-warning"
                   href="{% url 'tickets:ticket_list' %}">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</div>
{% endblock %}
